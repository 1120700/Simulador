<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador DOE - Diseño de Mezclas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sim-container">
        <h1>Simulador Químico - Diseño de Mezclas (DOE)</h1>
        <p class="subtitle">Componentes en Restricción de Suma Constante = 100%</p>

        <div class="layout">
            <!-- Panel de Controles -->
            <div class="panel controls">
                <h2>Factores de la Mezcla</h2>
                
                <div class="control-group">
                    <label>Agua: <span id="val-agua">60.0</span> %</label>
                    <input type="range" id="input-agua" min="0" max="100" step="0.1" value="60">
                </div>

                <div class="control-group">
                    <label>Vinagre: <span id="val-vinagre">20.0</span> %</label>
                    <input type="range" id="input-vinagre" min="0" max="100" step="0.1" value="20">
                </div>

                <div class="control-group">
                    <label>Bicarbonato: <span id="val-bicarbonato">20.0</span> %</label>
                    <input type="range" id="input-bicarbonato" min="0" max="100" step="0.1" value="20">
                </div>

                <div class="total-indicator valid" id="total-box">
                    <span id="total-status">✅ Total = 100.0 %</span>
                </div>

                <h2>Variable de Proceso</h2>
                <div class="control-group temp-group">
                    <label>Temperatura: <span id="val-temp">25</span> °C</label>
                    <input type="range" id="input-temp" min="0" max="100" value="25">
                </div>

                <button id="btn-calcular" class="btn-action">CALCULAR PH</button>
            </div>

            <!-- Panel de Visualización -->
            <div class="panel visualizer">
                <div class="beaker-container">
                    <div class="beaker" id="beaker">
                        <div class="liquid" id="liquid"></div>
                        <div class="bubbles" id="bubbles"></div>
                    </div>
                </div>

                <div class="meter-container">
                    <div class="ph-display" id="ph-box">
                        <div class="ph-label">pH METIDO</div>
                        <div class="ph-value" id="ph-value">--.--</div>
                        <div class="ph-badge" id="ph-badge">Esperando...</div>
                    </div>
                </div>

                <!-- Tabla de Datos Realizados -->
                <div class="table-container">
                    <h3>Resultados del Ensayo Actual</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Variable</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td>Agua</td><td id="tbl-agua">-</td></tr>
                            <tr><td>Vinagre</td><td id="tbl-vinagre">-</td></tr>
                            <tr><td>Bicarbonato</td><td id="tbl-bicarbonato">-</td></tr>
                            <tr><td>Temperatura</td><td id="tbl-temp">-</td></tr>
                            <tr class="highlight-row"><td>pH</td><td id="tbl-ph">-</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
